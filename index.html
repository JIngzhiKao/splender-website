                                            <div className="flex flex-col sm:flex-row justify-between sm:items-center border-b border-gray-200 pb-4 mb-4 gap-4">
                                                <div>
                                                    <h3 className="text-xl font-bold text-gray-900">{job.title} <span className="text-sm font-normal text-gray-500 ml-2">{job.subtitle}</span></h3>
                                                </div>
                                                <span className="bg-gray-200 text-gray-700 px-3 py-1 text-xs tracking-wider self-start sm:self-auto">{job.location}</span>
                                            </div>
                                            <p className="text-gray-600 text-sm mb-6 leading-relaxed">{job.shortDesc}</p>
                                            <button className="text-splender-blue font-semibold text-sm group-hover:underline flex items-center">
                                                查看詳情並應徵 <span className="ml-1">&rarr;</span>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto animate-fade-in">
                                <button onClick={() => setSelectedJob(null)} className="text-gray-500 hover:text-splender-blue mb-8 flex items-center text-sm font-semibold transition-colors">
                                    &larr; 返回所有職缺
                                </button>

                                <div className="bg-gray-50 border border-gray-200 p-8 md:p-10 mb-10 border-t-4 border-splender-blue shadow-sm">
                                    <div className="mb-8 border-b border-gray-200 pb-6">
                                        <h2 className="text-3xl font-bold text-gray-900 mb-2">{selectedJob.title}</h2>
                                        <p className="text-gray-500">{selectedJob.subtitle} • {selectedJob.location}</p>
                                    </div>

                                    <div className="space-y-8 mb-10">
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-900 mb-3">職務概述</h4>
                                            <p className="text-gray-600 leading-relaxed text-sm">{selectedJob.details}</p>
                                        </div>
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-900 mb-3">核心要求</h4>
                                            <ul className="list-disc list-inside text-gray-600 text-sm space-y-2">
                                                {selectedJob.reqs.map((req, idx) => <li key={idx}>{req}</li>)}
                                            </ul>
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 md:p-8 border border-gray-200 shadow-sm">
                                        <h4 className="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">應徵表單</h4>
                                        <form onSubmit={handleSubmit} className="space-y-5">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                <div>
                                                    <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">姓名 *</label>
                                                    <input type="text" name="name" required value={formData.name} onChange={handleChange} className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="您的姓名" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">電話 *</label>
                                                    <input type="tel" name="phone" required value={formData.phone} onChange={handleChange} className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="09XX-XXX-XXX" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">電子郵件 *</label>
                                                <input type="email" name="email" required value={formData.email} onChange={handleChange} className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="your@email.com" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">簡短自我介紹 *</label>
                                                <textarea name="intro" required value={formData.intro} onChange={handleChange} rows="3" className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors resize-none" placeholder="簡短說明您為什麼適合這個職位，以及您的技術優勢..."></textarea>
                                            </div>
                                            <button type="submit" className="w-full bg-splender-blue text-white py-4 font-semibold tracking-widest hover:bg-blue-800 transition-colors mt-2">
                                                產生應徵信草稿
                                            </button>
                                            <p className="text-xs text-center text-gray-500 mt-3">點擊後將啟動您的 Email 軟體，請記得在信件中附上您的 PDF 履歷。</p>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 尋找合作 (Contact) ---
        const Contact = () => (
            <div className="py-20 bg-gray-50 min-h-screen flex items-center">
                <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                    <div className="bg-white p-10 md:p-16 shadow-xl border-t-4 border-splender-blue">
                        <div className="text-center mb-10">
                            <h2 className="text-3xl font-light text-gray-900 mb-3">直接與工程團隊對話。</h2>
                            <p className="text-gray-500 text-sm">拋棄漫長的業務推銷。請提供專案細節，我們將在 24 小時內啟動可製造性初步審查。</p>
                        </div>
                        <form action="https://formspree.io/f/xpqyyajw" method="POST" className="space-y-6">
    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">姓名</label>
            {/* 加入 name="name" 並且設定 required (必填) */}
            <input type="text" name="name" required className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="您的姓名" />
        </div>
        <div>
            <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">公司電子郵件</label>
            {/* 加入 name="email" */}
            <input type="email" name="email" required className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors" placeholder="work@company.com" />
        </div>
    </div>
    <div>
        <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">專案階段</label>
        {/* 加入 name="project_stage" */}
        <select name="project_stage" className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors text-gray-700">
            <option value="Concept">概念設計階段</option>
            <option value="EVT">工程打樣階段</option>
            <option value="PV">準備開模量產</option>
            <option value="Transfer">現有模具轉移</option>
        </select>
    </div>
    <div>
        <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">專案細節與公差需求</label>
        {/* 加入 name="message" */}
        <textarea name="message" required rows="4" className="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors resize-none" placeholder="請簡述您的需求，包含材料特性 (如抗UV、耐溫) 或特定的幾何公差標準..."></textarea>
    </div>
    {/* 按鈕必須加上 type="submit" */}
    <button type="submit" className="w-full bg-splender-blue text-white py-4 font-semibold tracking-widest hover:bg-blue-800 transition-colors mt-4">
        送出可製造性初步審查
    </button>
</form>
                    </div>
                </div>
            </div>
        );

        // --- 主應用程式與 Footer ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');

            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <Home setActiveTab={setActiveTab} />;
                    case 'products': return <Products />; // 呼叫產品頁面
                    case 'capabilities': return <Capabilities />;
                    case 'company': return <Company />;
                    case 'careers': return <Careers />;
                    case 'contact': return <Contact />;
                    default: return <Home setActiveTab={setActiveTab} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="flex-grow">
                        {renderContent()}
                    </main>

                    {/* 包含你最新聯絡資訊的專業版 Footer */}
                    <footer className="bg-gray-900 pt-12 pb-8 border-t border-gray-800 text-gray-400 text-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-start gap-8">
                            {/* 左下角：公司聯絡資訊 */}
                            <div className="flex flex-col space-y-3 text-left">
                                <span className="text-white text-xl font-bold tracking-widest mb-2">SPLENDER</span>
                                <div className="flex items-start space-x-3">
                                    <span className="text-gray-500 mt-1">📍</span>
                                    <p className="leading-relaxed">
                                        新北市新莊區新泰路289號<br/>
                                        <span className="text-xs text-gray-500 uppercase tracking-wider">台北營運中心</span>
                                    </p>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <span className="text-gray-500">📞</span>
                                    <p>+886 0910-607-781</p>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <span className="text-gray-500">✉️</span>
                                    <p>JohnKaoPL@Gmail.com</p>
                                </div>
                            </div>

                            {/* 右下角：版權與附加連結 */}
                            <div className="text-left md:text-right flex flex-col justify-end h-full mt-auto md:ml-auto">
                                <p className="text-gray-300 mb-1 font-semibold tracking-wide">精密高分子工程。</p>
                                <p className="text-gray-600">&copy; 2026 SPLENDER. 版權所有。</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
